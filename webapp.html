<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Readiness Calculator</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f7f9;
            color: #222222;
            margin: 0;
            padding: 0;
        }

        .app-container {
            width: 85%;
            max-width: 700px;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.12);
        }

        h1 {
            color: #0b2545;
            text-align: center;
        }

        p {
            line-height: 1.6;
        }

        label {
            display: block;
            margin-top: 18px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            margin-top: 22px;
            width: 100%;
            padding: 12px;
            background-color: #0b2545;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #13315c;
        }

        #result {
            margin-top: 25px;
            padding: 18px;
            border-radius: 8px;
            background-color: #dce9f5;
            font-size: 18px;
            line-height: 1.5;
            display: none;
        }

        .nav-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #0b2545;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>Recovery Readiness Calculator</h1>

        <p>
            This web app estimates how ready an athlete may be to train based on sleep,
            soreness, hydration, and workout intensity. It is not medical advice, but it
            shows how user input can be collected and turned into a simple decision tool.
        </p>

        <label for="sleep">Hours of sleep last night:</label>
        <input type="number" id="sleep" min="0" max="12" placeholder="Example: 8">

        <label for="soreness">Soreness level from 1 to 10:</label>
        <input type="number" id="soreness" min="1" max="10" placeholder="1 = not sore, 10 = very sore">

        <label for="hydration">Hydration level from 1 to 10:</label>
        <input type="number" id="hydration" min="1" max="10" placeholder="1 = dehydrated, 10 = very hydrated">

        <label for="intensity">Yesterday's workout intensity from 1 to 10:</label>
        <input type="number" id="intensity" min="1" max="10" placeholder="1 = easy, 10 = extremely hard">

        <button onclick="calculateReadiness()">Calculate Readiness</button>

        <div id="result"></div>

        <a class="nav-link" href="scratch.html">Back to Training and Recovery Page</a>
    </div>

    <script>
        function calculateReadiness() {
            let sleep = Number(document.getElementById("sleep").value);
            let soreness = Number(document.getElementById("soreness").value);
            let hydration = Number(document.getElementById("hydration").value);
            let intensity = Number(document.getElementById("intensity").value);
            let result = document.getElementById("result");

            if (!sleep || !soreness || !hydration || !intensity) {
                result.style.display = "block";
                result.innerHTML = "Please fill out every box before calculating your readiness.";
                return;
            }

            if (sleep < 0 || sleep > 12 || soreness < 1 || soreness > 10 || hydration < 1 || hydration > 10 || intensity < 1 || intensity > 10) {
                result.style.display = "block";
                result.innerHTML = "Please enter sleep between 0 and 12, and all other ratings between 1 and 10.";
                return;
            }

            let score = 50;

            score += sleep * 4;
            score += hydration * 3;
            score -= soreness * 3;
            score -= intensity * 2;

            if (score > 100) {
                score = 100;
            }

            if (score < 0) {
                score = 0;
            }

            let message = "";

            if (score >= 80) {
                message = "You look ready for a strong training day. Still warm up well and listen to your body.";
            } else if (score >= 60) {
                message = "You are moderately ready. Training should be fine, but recovery habits still matter today.";
            } else if (score >= 40) {
                message = "Your readiness is low. Consider reducing intensity, adding mobility, or focusing on recovery.";
            } else {
                message = "Your body may need a recovery-focused day. Prioritize sleep, hydration, nutrition, and light movement.";
            }

            result.style.display = "block";
            result.innerHTML = "<strong>Readiness Score: " + score + "/100</strong><br>" + message;
        }
    </script>

</body>
</html>
